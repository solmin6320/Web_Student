<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div와 span 태그</title>
    <style>
        #footer {
            background-color: yellowgreen;
        }
        span {
            background-color: powderblue;
        }
    </style>
</head>
<body>
    <!---
    div 태그란?
    - 블록 요소를 그룹화 하는 컨테이너로 사용된다
    - 레이아웃을 구성할 떄 CSS와 함께 활용하여 구조를 정리할 수 있다

    span 태그란?
    - 인라인 요소를 그룹화하는 컨테이너이다
    - 텍스트의 특정 부분만 스타일을 적용할 때 사용된다. 
    -->
    <h1>그룹 태그</h1>
    <h2>div 요소</h2>
    <div id="footer">
        <ul>
            <li><a href="#">홈</a></li>
            <li><a href="#">회사소개</a></li>
        </ul>
        <address>COPYRIGHT &copy; sungil. All Rights Reserved </address>
    </div>
    <h2>span 요소</h2>
    <ul>
        <li>
            <strong><a href="#">오늘의 수업</a></strong><br>
            <em><a href="#">HTML5와 CSS3</a></em>
        </li>
    </ul>
</body>
</html>
