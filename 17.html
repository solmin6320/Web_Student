<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폼 입력 요소</title>
</head>
<body>
    <h1>input 요소</h1>
    <form action="join.jsp" method="post">
        <fieldset>
            <legend>회원가입</legend>
            <p>아이디 : <input type ="text" size="12" maxlength="8"></p>
            <p>패스워드 : <input type="password" size="12" maxlength="8"></p>
            <p>메일 수신 여부 :
                <input type="radio" value="Y" name="receive">예
                <input type="radio" value="Y" name="receive">아니오
            </p>
            <p>관심분야 :
                <input type="checkbox" value="HTML" name="chk1">HTML
                <input type="checkbox" value="CSS" name="chk2">CSS
                <input type="checkbox" value="JS" name="chk3">javascript
            </p>
            <P>
                <input type="submit" value="전송">
                <input type="reset" value="취소">
                <input type="button" value="확인">
            </P>
            <p>
                <input type="image" src="images/images.png">
            </p>
            <p>파일올리기 : <input type="file">
            </p>
            <p>
                <input type="hidden">
            </p>
        </fieldset>

    </form>
    <!-- 
    from 태그란?
    - 사용자로부터 데이터를 입력받는 HTML 요소이다
    - action : 서버로 데이터를 전송할 경로를 지정하는 속성이다
    - mathod : 데이터 전송 방식(get, post 등)을 지정하는 속성이다
-->
</body>
</html>
