<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고급 표 구조</title>
</head>
<body>
    <h1>표 만들기</h1>
    <table border="1" width="100%">
        <caption>태블릿 PC와 스마트폰 판매현황</caption>
        <COlgroup>
            <col width="50%" />
            <col width="25%" />
            <col width="20%" />
        </COlgroup>
        <THead>
            <tr>
                <td>구분</td>
                <td>태블랫PC</td>
                <td>스마트폰</td>
            </tr>
        </THead>
        <TBody>
            <tr>
            <td>상반기 판매수</td>
            <td>5만대</td>
            <td>10만대</td>
            </tr>
            <tr>
            <td>하반기 판매수</td>
            <td>3만대</td>
            <td>11만대</td>
            </tr>
        </TBody>
        <TFoot>
            <tr>
                <td>총 판매수</td>
                <td>5만대</td>
                <td>16만대</td>
            </tr>
        </TFoot>
    </table>
</body>
</html>
