<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>label요소와 폼 구조화</title>
</head>
<body>
    <h1>label 요소</h1>
    <form action="join.jsp" method="post">
        <fieldset>
            <legend>회원가입</legend>
            <table width="100%">
            <colgroup>
            <col width="30%">
            <col width="70%">
            </colgroup>
            <tbody>
                <tr>
                    <th scope="col"><label for="name">이름</label></th>
                    <td><input type="text" id="name"></td>
                </tr>
                <tr>
                    <th scope="col"><label for="id">아이디</label></th>
                    <td><input type="text" id="id"></td>
                </tr>
                <tr>
                    <th scope="col"><label for="pw">패스워드</label></th>
                    <td><input type="password" id="pw"></td>
                </tr>
                <tr>
                    <th scope="col"><label for="r_pw">패스워드 확인</label></th>
                    <td><input type="password" id="r_pw"></td>
                </tr>
            </tbody>
            </table>
            <p>
                <input type="submit" value="전송">
                <input type="reset" value="취소">
            </p>
        </fieldset>
    </form>
</body>
</html>
