<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * { margin: 0; padding: 0; }
        body {font: 12px 굴림; margin: 10px; }


        h1 { color: #808; }
        h2 {
            font-size: 0;
            line-height: 0;
            width: 0;
            height: 0;
            position: absolute;
            left: -9999px;
        }
        /* h2 숨김 처리의 목적
        - h2는 웹 접근성을 고려한 구조 유지용이다.
        - 검색엔진이나 스크린리더는 이 구조를 인식하고 있다.
        - 시각적으로는 숨기고, 의미는 남기기 위한 기법이다. */
        p {
            color: #666;
            width: 150px;
            padding: 10px;
            border: 1px solid #808;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>세상에 없은 12지 동물 - 용</h1>
    <h2>용의 기원</h2>
    <p>용의 기원은 정확하게 밝혀진 바 없으나 화석으로 인한 추정이 있고
        자연 현상으로 인한 상상이 있다.
    </p>
    <p>
        용의 모습
    </p>
    <p>
        화석이나 자연 현상이 워낙 강했기 때문에 용의 모습은 동양이나
        서양이나 곱상할 수는 없었을 것이다.
    </p>
    <h2>용의 의미</h2>
    <p>
        그 강한 용은 보통사람들이 갖지 못한 인상 때문에 신묘하여 우러를
        수 있는 존재를 의마하게 된 것이다.
    </p>
</body>
</html>
