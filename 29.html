<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>overflow 속성</title>
    <style>
        * {
            margin: 0; padding: 0;
        }
        body {
            font: 12px 굴림;
        }

        #container {
            border: 1px solid red;
            width: 200px;
            height: 100px;
            overflow: visible;


            /*
                visible : 넘친 내용이 그대로 보임 (기본값)
                hidden : 넘친 부분을 잘라냄
                scroll : 스크롤바를 항상 표시 -> 넘치지 않아도 스크롤 생성됨
                auto : 넘칠 떄만 스크롤바 표시
            */
        }
    </style>
</head>
<body>
    <div id="container">
        <blockquote>
            우리가 확실하다고 여기는 것이 아니라 불명확하게 지나치는
            사소한 것에 내가 누구인지 말해주는 현실적인 요소가 담겨 있다
        </blockquote>
        <p>김연수(소설가)</p>
        <p>
            이 글을 처음 알게 되었을 때 공감하여 입을 다물지 못하였다. 무릎 대신
            머리를 치는 것 같은 느낌을 받았다. 그 뒤로 나는 사람들이 발표하는 말이
            아닌 일상에서의 사소한 말들에 집중하기 시작했던 것 같다.
        </p>
    </div>
</body>
</html>
