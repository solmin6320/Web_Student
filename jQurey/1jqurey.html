<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery 기초</title>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script>
        $(function(){
            // 이 영역에 jQuery 문법을 사용할 수 있다.
            // 1. 기본 선택자
            $('*').css('font-size', '13px');
            $('h1').css('color', 'red').css('font-size', '20px'); // 체이닝
            $('#fisrtTitle').css('color', 'green');
            $('.nextTitle').css('color', 'blue');

            // 2. 자식 요소 선택자
            $('.obj3>li').css('font-weight', 'bold');
            $('.obj3').children('.theobj1').css('color', 'purple');

            // 3. 부모 요소 선택자
            $('.obj5').parent().css('border', '2px dashed #f00');

            // 4. 하위 요소 및 형제 요소 탐색
            $('#wrap h3').css('font-size', '20px').css('background-color', 'yellow');
            $('.obj5').next().css('color', 'orange');
            $('.obj4').prev().css('text-align', 'right');
            $('.obj6').siblings('li').css('text-align', 'center');

            // 5. 입력 요소 선택자
            $(':text').css({'background-color':'#ccc', 'border':'1px solid #000', 'color' :'green'});
        }); 
    </script>
</head>
<body>
    <div id="wrap">
        <h1>jQuery</h1>
        <h2 id="firstTitle">선택자</h2>
        <h3 class="nextTitle">부모 요소 선택자</h3>
        <div>
            <p class="obj1">현재 class가 'obj1'인 요소를 기준으로, 부모 요소는 'div'요소이다</p>
        </div>
        <h3>자식 요소 선택자</h3>
        <ul class="obj3">
            <li>리스트1</li>
            <li class="theobj1">리스트2</li>
            <li>리스트3</li>
        </ul>
        <h3>형 요소 선택자</h3>
        <ul>
            <li>리스트4</li>
            <li class="obj4">리스트5</li>
            <li>리스트6</li>
        </ul>
        <h3>동생 요소 선택자</h3>
        <ul>
            <li>리스트7</li>
            <li class="obj5">리스트8</li>
            <li>리스트9</li>
        </ul>
        <h3>형제 요소 선택자</h3>
        <ul>
            <li>리스트10</li>
            <li class ="obj6">리스트11</li>
            <li>리스트12</li>
        </ul>
        <h3>입력 요소 선택자</h3>
        <p>
            <label for="user_name">이름</label>
            <input type="text" name="user_name" id="user_name">
        </p>
    </div>
</body>
</html>
