<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Animate 연습</title>
    <style>
        * {
            margin: 0; padding: 0;
        }
        #box1 {
            width: 100px;
            height: 100px;
            background-color: #f00;
            position: relative;
        }
    </style>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script>
        $(function(){
            $('#box1').animate({
                letf: '500px',
                width: '200px',
                height: '200px',
                opacity: 0.5
            }, 3000).animate({
                top: '0',
                width: '100px',
                height: '100px',
                opacity: 1,
                background: 'blue'
            }, 3000).animate({
                letf: '0px',
                width: '200px',
                height: '200px',
                opacity: 0.5
            }, 3000).animate({
                top: '0',
                width: '100px',
                height: '100px',
                opacity: 1
            }, 3000);
        });
    </script>
</head>
<body>
    <div id="box1">박스1</div>
</body>
</html>
