<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위치 탐색</title>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script>
        $(document).ready(function() {
            // jQuery 문법 사용 가능
            // 1. 인덱스(순서) 기반 탐색(인덱스는 0번 부터)
            // 홀수 인덱스 (1, 3, 5)
            $('#list1 li:odd').css('background-color', 'yellow');

            // 짝수 인덱스
            $('#list1 li:even').css('background-color', 'grey');
            // 첫번째 요소
            $('#list1 li:first').css('color', 'red');
            // 마지막 요소
            $('#list1 li:last').css('color', 'green');

            // 2. 특정 인덱스 지정 및 범위 선택
            // 인덱스값이 1인 li 선택
            $('#list1 li').eq(1).css('font-style', 'italic');
            $('#list1 li:eq(2)').css('font-weight', 'bold');
            // 인덱스 2번 미만 (Less then -> lt)
            $('#list1 li:lt(2)').css('border', '2px dotted skyblue');
            // 인덱스 2번 초과
            $('#list1 li:gt(2)').css('border', '2px dotted purple');

            // 조건 및 속성 기반 필터링 탐색
            // 2의 배수번째 자식
            $('#list2 li:nth-child(2n)').css('background-color', 'orange');
            // 특정 텍스트를 포함하는 요소
            $('#list2 li:contains("리스트11")').css('color', 'red');
            // 특정 하위 텍스트를 포함하는 요소
            $('#list2 li:has("span")').css('color', 'aqua');
            // 선택된 애들 중 특정 클래스만 필터링
            $('#list2 li').filter('.theObj').css('font-size', '20px');
            // 하위 요소 중 특정 태그 검색
            $('#list2 li').find('a').css('background', 'red');

            // 내용 변경 및 삽입
            $('.theTitle').html('<a href="#">요소 객체 조작</a>');
            $('.obj1').text('리스트_2');

            // 대상 내부의 맨 뒤에 추가
            $('#list3').append('<li>list_6</li>');
            // 대상 내부의 맨 앞에 추가
            $('#list3').prepend('<li>list_1</li>');
            // 기준 요소 바로 직전에 추가
            $('<li>insertBefore</li>').insertBefore($('#list3 li:eq(4)'));
            // 기준 요소 바로 뒤에 추가
            $('<li>insertAfter</li>').insertAfter($('#list3 li:eq(5)'));

            // 복제, 삭제 및 클랴스 속성 제어
            // 복사해서 #list3 맨 뒤에 붙이기
            $('.obj1').clone().appendTo('#list3');
            // 첫 번 째 요소 삭제
            $('#list3 li').eq(0).remove();
            // 클래스 속성값을 obj2 로 변경
            $('#list3 li').eq(0).attr('class', 'obj2');
            $('.obj2').css('background', 'yellow');
            
            $('#list3 li').eq(0).addClass('obj3');
            $('.obj3').css('color', 'red');

            $('.obj1').css('font-size', '30px');
        });
    </script>
</head>
<body>
    <div id="wrap">
        <h1>탐색 선택자 및 html 조작</h1>

        <h2>탐색 선택자</h2>
        <ul id="list1">
            <li>리스트1</li>
            <li>리스트2</li>
            <li>리스트3</li>
            <li>리스트4</li>
            <li>리스트5</li>
            <li>리스트6</li>
            <li>리스트7</li>
        </ul>

        <ul id="list2">
            <li>리스트8</li>
            <li class="theObj">리스트9</li>
            <li><span>리스트10</span></li>
            <li>리스트11</li>
            <li><a href="">리스트12</a></li>
            <li>리스트13</li>
            <li>리스트14</li>
        </ul>
        <h2 class="theTitle">html 조작</h2>
        <ul id="list3">
            <li class="obj1">list_2</li>
            <li>list_3</li>
            <li>list_4</li>
            <li>list_5</li>
        </ul>
    </div>
</body>
</html>
