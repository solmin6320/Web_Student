<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery 스크롤 위치 감지</title>
    <style>
        body {
            height: 3000px;
        }
        .box {
            width: 100px;
            height: 100px;

        }
        .box1 {
            background-color: red;
            position: absolute;
            top: 1000px;
            left: -500px;
            transition: all 0.6s;
        }
        .box2 {
            background-color: blue;
            position: absolute;
            top: 2000px;
            right: -500px;
            transition: all 0.6s;
        }
        .box1.on {
            left: 500px;
        }
        .box2.on {
            right: 500px;
        }
    </style>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script>
        $(function(){
            $(window).scroll(function() {
                let sct = $(window).scrollTop();

                if (sct > 700) {
                    $('.box1').addClass('on');
                }

                if (sct > 1400) {
                    $('.box2').addClass('on');
                }
            });
        });
    </script>
</head>
<body>
    <div class="box box1"></div>
    <div class="box box2"></div>
</body>
</html>
