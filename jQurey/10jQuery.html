<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery 스크롤 애니메이션 직접 제어</title>
    <style>
        * {
            margin: 0; padding: 0;
        }
        
        body {
            height: 4000px;
        }

        #sct {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.6);
            position: fixed;
            top: 0;
            left: 0;
            color: #fff;
            font-size: 20px;
            line-height: 100px;
            text-align: center;
            z-index: 100;
        }

        #box1 {
            width: 50px;
            height: 50px;
            background-color: aqua;
            position: absolute;
            top: 1000px;
            left: -100px;
        }
        #box2 {
            width: 50px;
            height: 50px;
            background-color: coral;
            position: absolute;
            top: 2000px;
            right: -100px;
        }
    </style>
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script>
        $(function(){
            $(window).scroll(function(){
                let k = $(window).scrollTop();

                $('#sct span').text(k);

                // 실험1 stop() 브레이크가 장착된 아쿠아 박스
                if (k>=700 && k <= 900) {
                    $('#box1').stop().animate({left: '50%'}, 1000);
                } else {
                    $('#box1').stop().animate({left: '-100px'}, 1000);
                }

                // 실험2 stop() 브레이크가 누락된 빨간 박스
                if (k >= 1500 && k <= 1800) {
                    $('#box2').animate({right: '50%'}, 1000);
                } else {
                    $('#box2').animate({right: '-100px'}, 1000);
                }
            });
        });
    </script>
</head>
<body>
    <div id="sct">현재 스크롤 위치는 : <span>0</span>px</div>

    <div id="box1"></div>
    <div id="box2"></div>
</body>
</html>
