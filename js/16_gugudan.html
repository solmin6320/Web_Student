<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구구단</title>
    <script>
        let result;
        let dan=9;
        document.write('<h1>' + dan + '단</h1>');
        for (let i=1; i<=9; i++) {
            result=i*dan;
            document.write(dan + 'X' + i + ' = ' + result + '<br>');
        }
    </script>
</head>
