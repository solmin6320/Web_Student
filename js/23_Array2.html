<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array 객체 활용</title>
    <script>
        let theFood = ['짜장면', '냉면', '갈비탕', '돈까스', '삼겹살'];
        console.log(theFood);
        // let theFoodR = new Array();
        // for (let i = theFood.length -1; i>=0; i--) {
        //     theFoodR[4-i] = theFood[i];
        // }
        theFood.reverse();
        console.log(theFood);

        let theSubway = ['2호선', '9호선', '7호선', '4호선', '3호선'];
        theSubway.sort();
        console.log(theSubway);

        let mountain1 = ['남산', '도봉산', '관악산', '청계산', '북한산'];
        let mountain2 = ['설악산', '지리산', '한라산', '속리산'];
        let mountainU = mountain1.concat(mountain2);
        // 합친 배열에서 가나다순의 역순으로 정렬하고 싶을 때
        mountainU.sort().reverse();
        console.log(mountainU);

        let theName = ['유재석', '박명수', '정준하', '노홍철', '정형돈'];
        let result = theName.slice(2, 4); // 인덱스 번호 2이상 4미만을 잘라서 새로운 배열 생성
        console.log(theName);
        console.log(result);

        let theProduct = ['냉장고', '컴퓨터', '선풍기', '밥솥', '에어컨'];
        let joinResult = theProduct.join(',');
        console.log(joinResult);

        const nums = [5, 10, 2, 25];
        nums.sort();
        console.log(nums);

        // 파괴성: revers(), sort()와 같이 실행하는 순간 원본 배열이 순서가
        // 영구적으로 변한다
        // 불변성: concat(), slice()는 실행해도 원본은 그대로 유지된다
        // 현대 프론트엔드 트렌드는 원본 데이터가 조용히 수정되어 버리면 화면 버그를
        // 유발할 수 있기 때문에 '원본 보존'을 중시한다.
        // 그래서 파괴성이 일어나는 함수의 경우 원본을 백업 후 사용해야 한다.
    </script>
</head>
<body>
    
</body>
</html>
