<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 처리</title>
    <script>
        function greet() {
            alert('안녕히가세요!');
        }
    </script>
</head>
<body>
    <button onclick="greet();">버튼</button>
</body>
</html>

<!-- HTML 태그 안에 onclick=''을 직접 적는 방식을 '인라인 이벤트 모델'이라고 한다.
문제점: 프로젝트가 커져서 버튼이 수백개가 되면 HTML 소스코드가 자바스크립트 명령어로 뒤범벅이
되며 유지보수가 매우 어려워진다. 또한 하나의 버튼에 '클릭 시 로그 기록', '클릭 시 입력창'
같은 여러 기능을 동시에 연결하기가 힘들다.
트렌ㄷ: 실무에서는 HTML은 오직 뼈대 구조만 담담하게 놔두고, 자바스크립트 파일 안에서 HTML 요소
선택해 addEventListener() 라는 메서드로 이벤트를 따로 감시하고 붙이는 방식을 사용한다.

현업에서는 function 키워드 보다 더 간결하고 직관적인 문법 화살표 함수 () => () 문법을 
압도적으로 많이 사용한다. 코드가 더 간결해지고, 자바스크립트의 까다로운 개념인 this 바인딩 문법을
깔끔하게 해결해 준다. -->
