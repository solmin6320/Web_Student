<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모던 자바스크립트 배열 대기열 제어</title>
</head>
<body>
    <div id="subway-app"></div>

    <script>
        const appContainer = document.querySelector('#subway-app');
        
        // 1. 초기 노선 데이터 정리
        const baseSubway = ['2호선', '9호선', '7호선', '4호선', '3호선'];

        // 2. shift 대신 slice와 스프레드로 맨 앞 원소 제거
        const shiftedSubway = baseSubway.slice(1);

        // 3. unshift 대신 스프레드 연산자로 맨앞에 1호선 넣기
        const unshiftedSubway = ['1호선', ...shiftedSubway];
        console.log(baseSubway);
        console.log(shiftedSubway);
        console.log(unshiftedSubway);

        // 4. 실무에서 많이 사용함
        // 빈 배열에 데이터베이스 데이터를 차곡차곡 쌓는 push 시뮬레이션
        const dbFetchedData = [];
        dbFetchedData.push('분당선');
        dbFetchedData.push('신분당선');
        dbFetchedData.push('경의중앙선');
        
        console.log(dbFetchedData);

        const finalSubwayLine = [...unshiftedSubway, ...dbFetchedData];
        
        console.log(finalSubwayLine);
    </script>
</body>
</html>
