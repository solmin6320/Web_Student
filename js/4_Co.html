<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비교 연산자</title>
    <script>
        let A=10;
        let B=3;
        let result;

        result = A>B;
        document.write(`${result}<br>`);
        result = A < B;
        document.write(`${result}<br>`);
        result = A==B;
        document.write(`${result}<br>`);
        result = A!=B;
        document.write(`${result}<br>`);

        // 동등비교는 == 대신 === 를 사용하자
        // 위의 수업 코드에서 같은지 비교할 때 A==B를 사용하였다
        // 하지만 현업에서는 == 을 거의 쓰지 않고, 대체로 === 를 사용한다.
        // 마찬가지로 다르다도 != 이 아니라 !== 을 사용한다.

        let num1 = 10;
        let num2 = '10';
        result = num1 == num2;
        document.write(`${result}<br>`);
        result = num1===num2;
        document.write(`${result}<br>`);

        // == 과 달리 === 은 타입까지 엄격히 검사한다

        // 불리언 변수에서 이름 짓는 트랜드 : is, has, can
        //우리는 결과를 result라는 변수에 담았지만, 현업에서는 ㅇ; 변수에
        // true/false가 들어있다는 것을 이름만봐도 알 수 있게끔 접두사를
        // 붙이는 매너가 있다
        // 값이 참/거짓인 경우는 주로 is접두사를 활용
        // 예를 들어 로그인이 되어있는지 isLoggedIn 값이 유효한지 isVold,
        // 데이터가 존재하는지는 hasData 같은식으로 이름을 짓는다.


    </script>
</head>
<body>
    
</body>
</html>
