<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date() 객체</title>
    <script>
        document.write('<h1>현재 날짜/시간 정보</h1>');
        let today = new Date();
        let nowYear = today.getFullYear();
        let nowMonth = today.getMonth() + 1; // 0~11로 받아오기 때문에 +1을 해줘야 함
        let nowDate = today.getDate();
        let nowDay = today.getDay(); // 0: 일요일 1: 월요일 ... 6: 토요일

        let nowDayH = null;
        switch(nowDay) {
            case 0:
                nowDayH = '일요일';
                break;
            case 1:
                nowDayH = '월요일';
                break;
            case 2:
                nowDayH = '화요일';
                break;
            case 3:
                nowDayH = '수요일';
                break;
            case 4:
                nowDayH = '목요일';
                break;
            case 5:
                nowDayH = '금요일';
                break;
            case 6:
                nowDayH = '토요일';
                break;
                default:
                    alert('잘못된 요일입니다.');
        }

        let nowHours = today.getHours();
        let nowMinutes = today.getMinutes();
        let nowSeconds = today.getSeconds();

        document.write('년 : ' + nowYear + '<br>');
        document.write('월 : ' + nowMonth + '<br>');
        document.write('일 : ' + nowDate + '<br>');
        document.write('요일 : ' + nowDay + '<br>');
        document.write('요일 : ' + nowDayH + '<br>');
        document.write('시 : ' + nowHours + '<br>');
        document.write('분 : ' + nowMinutes + '<br>');
        document.write('초 : ' + nowSeconds + '<br>');
    </script>
</head> 
<body>
    
</body>
</html>
