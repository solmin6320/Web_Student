<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>논리 연산자</title>
    <script>
        let gender = prompt('당신의 성별은?', '남성');
        let age = prompt('당신의 나이는?', 18);
        let result = age >= 18 && age <= 30 && gender === '남성';
        alert(result);

    
// prompt('질문', '기본값') : 브라우저에 글자를 입력할 수 있는 팝업창(알림창)을
// 띄우는 함수어, 사용자가 입력한 값이 변수에 작성된다.
// && (AND 논리 연산자) : 나열된 모든 조건이 true 일때만 최종 결과가 true
// prompt()로 입력받은 값은 값은 숫자를 입력해도 무조건 '문자열' 타입으로 돌아온다


        // prompt 와 alert 은 현업에서 사용할까
        // 현업에서는 거의 사용하지 않는다
        // 디자인이 투박해서 서비스의 미관을 해칠 뿐만 아니라, 이 팝업창이 떠있는 동안
        // 브라우저의 다른 자바스크립트 동작이 일시적으로 멈춰버리는
        // 문제가 있다
        // -> input 태그를 이용해 화면 안에서 세련되게 입력을 받거나, 필요한 경우
        // HTML/CSS로 직접 예쁘게 모델창을 띄워서 입력을 유도한다.
    </script>
</head>
<body>
    
</body>
</html>
