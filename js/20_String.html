<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String 객체</title>
    <script>
        let theText = 'Sungil Information High School';
        document.write(theText + '<br>');
        document.write(theText.bold() + '<br>');
        document.write(theText.link('https://sungili-h.goesn.kr/sungili-h/main.do)') + '<br>')
        document.write(theText.length + '<br>');
        document.write(theText.toLowerCase + '<br>');
        document.write(theText.toUpperCase + '<br>');
        document.write(theText.indexOf('H') + '<br>');
        document.write(theText.lastIndexOf('n') + '<br>');
        document.write(theText.charAt(5) + '<br>');
        document.write(theText.substring(7, 18) + '<br>');
        document.write(theText.substr(7, 18) + '<br>');
        document.write(theText.replace('High', 'Middle') + '<br>');
        document.write(theText.slice(7, 9) + '<br>');
        document.write(theText.concat(' Fighting') + '<br>');
        document.write(theText.split(' ') + '<br>');

        // bold(), link()는 웹 표준에서 공식적으로 완전히 제거된 문법이다.
        // 이유: 현대 웹 개발은 HTML은 뼈대, CSS는 디자인, 자바스크립트 로직 이라는 역할
        // 분담이 철저히 지겨져야 한다,
        // 2. substr() 대신 substring() 혹은 slice()를 사용하는게 표준 트렌드
        // 이유: substr()은 브라우저 환경에 따라 지원하지 않을 수 있는 비표준 문법
        // 현업에서는 문자열을 부분 추출할 때 오직 substring() 과 slice() 두 가지만 사용
        // 3. 실무 활용도 10,000%의 주인공: split(), replace()
        // 1) split: 데이터베이스에 유저가 '서울시 강남구 역삼동' 이라고 주소를 저장했다면,
        // address.split(' ')[0] 을 실행하는 것만으로 '서울시'라는 핵심 지역 데이터만
        // 뽑아낼 수 있다.
        // 2) replace: 문자열에서 특정 비속어나 욕설을 찾아내서 필터링하거나, 날짜 포맷을
        // 일괄 변경할 때 현업에서 엄청나게 사용한다.
    </script>
</head>
<body>
    
</body>
</html>
