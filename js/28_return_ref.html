<!DOCTYPE html>

<head>

    <title>모던 자바스크립트 return 활용</title>
</head>
<body>
    <h1 id="output-box">결과를 계산 중...</h1>

    <script>
        const outputElement = document.querySelector('#output-box');
        const baseNum = 10; // 모던 자바스크립트는 값 오염 방지를 위해 const를 기본으로 쓴다.


        const calculateSum = (inputNum) => {
            return baseNum + inputNum;
        }


        const finalResult = calculateSum(40);

        outputElement.textContent = `최종 연산 결과값은 [${finalResult}] 입니다`;

        // 얼리 리턴의 예
        const processData = (score) => {

                return '잘못된 점수 입니다'

            return score >= 60 ? '합격' : '불합격';

            // 올바르지 않은 데이터가 들어오면 아래쪽 무거운 연산을 실행하기도 전에
            // reutrn; 으로 일찍 내쫒아 버리는 방식을 얼리 리턴이라고 한다.
        }
    </script>
</body>
</html>
