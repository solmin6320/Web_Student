<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 갤러리</title>
    <style>
        * {margin: 0; padding: 0;}
        img {
            vertical-align: top; border: 0;
        }
        #galleryWrap {
            width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        #galleryWrap img {
            vertical-align: middle;
        }
    </style>
    <script>
        let num = 1;
        function nextGallery() {
            num++;
            if (num>7) {
                num = 1;
            }
            document.getElementById('galley').src='images/img'+num+'.jpg';
            return false;
        }
        function prevGallery() {
            num--;
            if (num<1) {
                num = 7;
            }
            document.getElementById('galley').src='images/img'+num+'.jpg';
            return false;
        }
    </script>
</head>
<body>
    <div id="galleryWrap">
    <h1>이미지 넘기기</h1>
    <p>
        <a href="#prev" onclick="return prevGallery();">
            <img src="images/left_btn.png" alt="이전 그림">
        </a>
        <img id= "galley"src="images/img1.jpg" alt="갤러리 그림">
        <a href="#next" onclick="return nextGallery();">
            <img src="images/right_btn.png" alt="다음 그림">
        </a>
    </p>
    </div>
</body>
</html>
