<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재귀 함수[ㅊ]</title>
    <script>
        let i=0;
        function theTest() {
            i++;
            document.write('안녕하세요' + i + '<br>');
            if (i<10) theTest();
        }
        // 함수 최초 호출
        theTest();
        // for문이나 while문 같은 반복문 키워드를 전혀 사용하지 않고,
        // 자기 자신을 다시 호출하는 기법을 재귀 함수라고 한다.
        // 1. 재귀 호출 (theTest() 내부의 theTest())
        // 함수가 동작하는 중에 자기 자신과 똑같이 생긴 함수를 또 호출하는
        // 매커니즘이다.
        // 2. 기반 조건 or 탈출 조건
        // - if(i<10) 구문은 재귀함수에서 절대로 빠져서는 안되는 가장 중요한
        // 안전장치이다.
        // 현업에서는 단순한 반복 작업을 할 때는 재귀함수보다 일반적인 for문
        // while문, 배열 고차 함수를 쓰는 것을 권장한다.
        // 현업에서 재귀함수는 일반 반복문으로 도저히 풀 수 없는 트리 구조
        // 데이터를 다룰 때 압도적인 위력을 발휘한다
        // 대표적인게 무한 댓글/대댓글 기능
    </script>
</head>
<body>
    
</body>
</html>
