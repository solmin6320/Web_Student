<!DOCTYPE html>

<head>

    <title>html기초 - p태그</title>
</head>
<body>
    <p>
        단락을 정리하는 p요소는 블록 요소이므로 줄 바꿈이 일어남

    <p>
        p 요소는 텍스트와 <strong>인라인 요소</strong>를 포함할 수 있지만 같은 <h1>블록 요소</h1>는
        포함할 수 없다
    </p>
