<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 박스 만들기</title>
    <style>
        * {margin: 0; padding: 0; }
        a { text-decoration: none; color:  #000; }
        body {
            font: 12px 굴림; margin: 10px;
        }
        #bbs {
            position: relative;
            width: 260px;
            border: 2px solid #ccc;
            background-color: #ffefee;
            padding: 10px;
        }
        #bbs dt {
            font-weight: bold;
            font-size: 120%;
            padding-bottom: 10px;
            color: #080;
        }
        #bbs dd a {
            color: #666;
            padding-left: 10px;

        }
        #bbs dd a:hover {
            text-decoration: underline;
            color: #00f;
        }
        #bbs p {
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>
    <div id="bbs">
        <dl>
            <dt>동물병원 24시</dt>
            <dd><a href="#">밥 먹이는 시간 지킬것</a></dd>
            <dd><a href="#">길고양이 주사 맞히기</a></dd>
            <dd><a href="#">눈 아픈 동물 목에 깔때기 씌우기</a></dd>
            <dd><a href="#">매일 목욕 시키기</a></dd>
            <dd><a href="#">이름없는 애들 이름 짓지 말기</a></dd>
        </dl>
        <p class="more"><a href="#">더보기</a></p>
    </div>
</body>
</html>
