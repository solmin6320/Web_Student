<!DOCTYPE html>
<html lang="KO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML기초 - 텍스트요소</title>
</head>
<body>
    <H2>강조</H2>
    <p>이제는 <em>반응형 웹이</em>대세이다</p>
    <p>이제는 <strong>반응형 웹이</strong>대세이다</p>
    <h2>생력어와 두문자어</h2>
    <p><ABBr title="Long Term Services">LTS</ABBr></p>
    <H2>추가글과 삭제글</H2>
    <P>정기세일 : <DEL>8.30 - 9.15</DEL></P>
    <P>정기세일 : <INS>9.01- 9.30</INS></P>
    <H2>윗첨자와 아래첨자</H2>
    <P>x<sup>2</sup></P>
    <P>co <sub>2</sub></P>
</body>
</html>
