<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html 기초 - 리스트3</title>
</head>
<body>
    <h2>우리가 배울 웹기술</h2>
    <ul>
        <li>html</li>
        <li>css</li>
        <li>javascript</li>
    </ul>
    <h2>우리가 배울 웹기술(간단설명초함)</h2>
    <dl>
        <dt>html</dt>
        <dd>웹 문서를 만들기 위한 마크업 언어</dd>

        <dt>css</dt>
        <dd>웹 문서의 디자인과 스타일을 설정하는 언어</dd>

        <dt>javascript</dt>
        <dd>웹 페이지에서 동적인 기능을 축하는 프로그래밍 언어</dd>
    </dl>
</body>
</html>
