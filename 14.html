<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>표 만들기</title>
</head>
<body>
    <!--table, tr, th, td--
    table -> 테이블 생성 -> 표 전체를 감싸는 태그
    tr -> 행(row)를 정의
    td -> 개별 셀(cell)
    th -> 제목 셀(굵은 글씨, 중앙 정렬)
    -->
    <h1>표 만들기</h1>

    <h2>1행 1열</h2>
    <table border="1">
        <tr>
            <td>1행 1열</td>
        </tr>
    </table>
    <h2>1행 2열</h2>
    <table border="1">
        <tr>
            <td>1행 1열</td>
            <td>1행 2열</td>
        </tr>
    </table>
    <h2>2행 2열</h2>
    <table border="1">
        <tr>
            <td>
                1행 1열
            </td>
            <td>
                1행 2열
            </td>
        </tr>
        <tr>
            <td>
                2행 1열
            </td>
            <td>
                2행 2열
            </td>
        </tr>
    </table>
    <h2>명단</h2>
    <table border="1">
        <tr>
            <th>순번</th>
            <th>이름</th>
            <th>나이</th>
        </tr>
        <tr>
            <td>1</td>
            <td>홍길동</td>
            <td>25</td>
        </tr>
        <tr>
            <td>2</td>
            <td>장발장</td>
            <td>45</td>
        </tr>
    </table>
</body>
</html>
